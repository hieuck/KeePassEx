# KeePassEx Server — Docker Compose
# Quick start: docker compose up -d

services:
  keepassex-server:
    image: keepassex/server:latest
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    container_name: keepassex-server
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - keepassex-data:/data
    environment:
      KPX_PORT: '8080'
      KPX_HOST: '0.0.0.0'
      KPX_DB: '/data/keepassex.db'
      KPX_MAX_VAULT_MB: '100'
      # Set a strong secret in production:
      # KPX_JWT_SECRET: "your-secret-here"
      # Enable admin API (optional):
      # KPX_ADMIN_ENABLED: "true"
      # KPX_ADMIN_KEY: "your-admin-key"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  keepassex-data:
    driver: local
