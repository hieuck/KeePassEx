name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust Core ──────────────────────────────────────────────────────────────
  rust-check:
    name: Rust — Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all --all-features

      - name: Check docs
        run: cargo doc --no-deps --all-features

  # ─── TypeScript ─────────────────────────────────────────────────────────────
  ts-check:
    name: TypeScript — Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build packages
        run: pnpm build --filter='./packages/*' --filter='./shared/*'

  # ─── Desktop Build ──────────────────────────────────────────────────────────
  desktop-build:
    name: Desktop — ${{ matrix.platform }}
    needs: [rust-check, ts-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os-name: linux
          - platform: macos-latest
            os-name: macos
          - platform: windows-latest
            os-name: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm --filter @keepassex/desktop tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os-name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/
          retention-days: 7

  # ─── CLI Build ──────────────────────────────────────────────────────────────
  cli-build:
    name: CLI — ${{ matrix.target }}
    needs: rust-check
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --release -p keepassex-cli --target ${{ matrix.target }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: kpx-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/kpx${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  # ─── Browser Extension ──────────────────────────────────────────────────────
  browser-extension:
    name: Browser Extension
    needs: ts-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Chrome extension
        run: pnpm --filter @keepassex/browser-extension build:chrome

      - name: Build Firefox extension
        run: pnpm --filter @keepassex/browser-extension build:firefox

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: browser-extension-chrome
          path: apps/browser-extension/dist/

  # ─── Security Audit ─────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust security audit
        run: cargo audit

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: npm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # ─── Mobile — iOS ───────────────────────────────────────────────────────────
  mobile-ios:
    name: Mobile — iOS Build Check
    runs-on: macos-latest
    needs: ts-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install CocoaPods
        run: |
          cd apps/mobile/ios
          pod install --repo-update
        continue-on-error: true  # Pods may fail without full RN setup

      - name: TypeScript check (mobile)
        run: pnpm --filter @keepassex/mobile typecheck

      - name: Build iOS (Release)
        run: |
          cd apps/mobile
          npx react-native build-ios --mode Release --no-packager
        continue-on-error: true  # Requires signing certificates in CI

  # ─── Mobile — Android ───────────────────────────────────────────────────────
  mobile-android:
    name: Mobile — Android Build
    runs-on: ubuntu-latest
    needs: ts-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: echo "y" | sdkmanager "ndk;26.1.10909125"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (mobile)
        run: pnpm --filter @keepassex/mobile typecheck

      - name: Build Android (Debug)
        run: |
          cd apps/mobile/android
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ─── Watch — WearOS ─────────────────────────────────────────────────────────
  wearos-build:
    name: WearOS — Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build WearOS (Debug)
        run: |
          cd apps/watch/wearos
          ./gradlew assembleDebug --no-daemon
        continue-on-error: true  # May fail without full SDK setup

  # ─── Shared Utils Tests ──────────────────────────────────────────────────────
  shared-tests:
    name: Shared Utils — Tests
    runs-on: ubuntu-latest
    needs: ts-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build --filter='./packages/*' --filter='./shared/*'

      - name: Run shared utils tests
        run: pnpm --filter @keepassex/utils test

      - name: Run i18n tests
        run: pnpm --filter @keepassex/i18n test

      - name: Run UI component tests
        run: pnpm --filter @keepassex/ui test

      - name: Run desktop tests
        run: pnpm --filter @keepassex/desktop test

      - name: Run browser extension tests
        run: pnpm --filter @keepassex/browser-extension test
